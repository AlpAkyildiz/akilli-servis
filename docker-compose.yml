version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: akilli_servis_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-akilliservis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: akilli_servis_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Backend and Frontend can be uncommented once Dockerfiles are ready in their respective directories
  # backend:
  #   build: ./backend
  #   container_name: akilli_servis_backend
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-akilliservis}
  #     - REDIS_URL=redis://redis:6379
  #   depends_on:
  #     - db
  #     - redis

  # frontend:
  #   build: ./frontend
  #   container_name: akilli_servis_frontend
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  redis_data:
